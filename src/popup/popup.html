<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg class="logo" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="10" fill="url(#grad)"/>
          <path d="M10 11L16 17L22 11" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 16L16 22L22 16" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32">
              <stop stop-color="#7C5CFC"/>
              <stop offset="1" stop-color="#5B3FD4"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="brand-name">Scrooly</h1>
      </div>
    </header>

    <!-- Platforms -->
    <section class="platforms">

      <div class="platform-row" data-platform="youtube">
        <div class="platform-info">
          <span class="platform-pulse" data-pulse="youtube"></span>
          <span class="platform-name">YouTube</span>
        </div>
        <label class="switch switch-youtube">
          <input type="checkbox" class="platform-toggle" data-key="youtube" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="platform-row" data-platform="tiktok">
        <div class="platform-info">
          <span class="platform-pulse" data-pulse="tiktok"></span>
          <span class="platform-name">TikTok</span>
        </div>
        <label class="switch switch-tiktok">
          <input type="checkbox" class="platform-toggle" data-key="tiktok" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="platform-row" data-platform="instagram">
        <div class="platform-info">
          <span class="platform-pulse" data-pulse="instagram"></span>
          <span class="platform-name">Instagram</span>
        </div>
        <label class="switch switch-instagram">
          <input type="checkbox" class="platform-toggle" data-key="instagram" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="platform-row" data-platform="snapchat">
        <div class="platform-info">
          <span class="platform-pulse" data-pulse="snapchat"></span>
          <span class="platform-name">Snapchat</span>
        </div>
        <label class="switch switch-snapchat">
          <input type="checkbox" class="platform-toggle" data-key="snapchat" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="platform-row" data-platform="twitter">
        <div class="platform-info">
          <span class="platform-pulse" data-pulse="twitter"></span>
          <span class="platform-name">X</span>
        </div>
        <label class="switch switch-twitter">
          <input type="checkbox" class="platform-toggle" data-key="twitter" checked>
          <span class="slider"></span>
        </label>
      </div>

    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-stats">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 4.5L6 7.5L9 4.5"/>
        </svg>
        <span id="scrollCount">0</span> scrolled
      </div>
      <a href="https://github.com/lucas-jammes/Scrooly" target="_blank" class="github-link" title="View source on GitHub">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
